_version: 1

# 应用级消息
app:
  name: 览境
  starting: 正在启动...
  ready: 就绪

# 错误消息
error:
  generic: 发生错误
  network: 网络连接失败
  storage: 存储操作失败
  permission: 权限不足

# 通知消息
notification:
  update-available: 有可用更新
  task-completed: 任务已完成

# 规则相关
rule:
  error:
    rule-id-payload-mismatch: 请求体中的 ruleId 必须与目标资源保持一致。

# 诊断消息
diagnostic:
