    title: 图端口类型不匹配
    description: "诊断代码 %{code}：节点端口类型与连接类型不一致，期望 %{expected}，实际 %{actual}。"
  unknown:
    title: "未知诊断 %{code}"
    description: "诊断代码 %{code} 暂无本地化模板，请按机器代码排查。"
  fix:
    insert-normalize-node: 插入规范化节点
