# cargo-deny configuration for Lanjing.
# Run `cargo deny check` to validate.

[advisories]
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
notice = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSL-1.0",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "CC0-1.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "OpenSSL",
]
deny = []
skip = []
skip-tree = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
